<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>neu_box — 终端沙盒</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="stylesheet" href="/static/css/terminal.css">
<link rel="stylesheet" href="/static/css/command.css">
<link rel="stylesheet" href="/static/css/experiment.css">
<!-- <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> -->
</head>
<body>

<div class="layout">

  <!-- ═══ 左栏：表单 ═══ -->
  <div class="panel panel-form" id="formPanel">
    <div class="header">
      <h1>neu_box</h1>
      <button class="theme-toggle" id="themeToggle" title="切换浅色/深色模式">🌙</button>
      <!-- 模式切换 -->
      <div class="mode-toggle" id="modeToggle">
        <button type="button" data-mode="command" class="active">任务</button>
        <button type="button" data-mode="terminal">终端</button>
        <button type="button" data-mode="experiment">实验</button>
      </div>
    </div>

    <!-- 节点列表（共用） -->
    <div class="section-label">
      节点 <span class="unit" id="nodeCount"></span>
      <button class="refresh-btn" id="refreshBtn" title="手动刷新节点状态" aria-label="刷新节点">↻</button>
      <button class="refresh-btn" id="manageNodesBtn" title="管理节点" aria-label="管理节点" style="font-size:14px">⚙</button>
    </div>
    <div class="node-list" id="nodeList">
      <div class="node-card node-card-loading">
        <span class="node-status-dot offline"></span>
        <span style="color:var(--sub)">加载中…</span>
      </div>
    </div>

    <form id="mainForm" novalidate>
      <!-- CPU（共用） -->
      <div class="field">
        <label>CPU <span class="unit">核心数</span></label>
        <div class="stepper" data-field="cpu">
          <button type="button" data-action="down" aria-label="减少 CPU">−</button>
          <input type="text" class="value" value="不限制" inputmode="numeric">
          <button type="button" data-action="up"   aria-label="增加 CPU">+</button>
        </div>
      </div>

      <!-- 内存（共用） -->
      <div class="field">
        <label>内存</label>
        <div class="memory-row">
          <div class="stepper" data-field="memory">
            <button type="button" data-action="down" aria-label="减少内存">−</button>
            <input type="text" class="value" value="不限制" inputmode="numeric">
            <button type="button" data-action="up"   aria-label="增加内存">+</button>
          </div>
          <div class="memory-unit" id="memUnit">
            <button type="button" data-unit="MB">MB</button>
            <button type="button" data-unit="GB" class="active">GB</button>
          </div>
        </div>
      </div>

      <!-- 异构设备数（共用） -->
      <div class="field">
        <label>异构设备 <span class="unit">GPU/NPU 卡数</span></label>
        <div class="stepper" data-field="device_num">
          <button type="button" data-action="down" aria-label="减少设备数">−</button>
          <span class="value">0</span>
          <button type="button" data-action="up"   aria-label="增加设备数">+</button>
        </div>
      </div>

      <!-- 设备选择（指定卡号，优先级高于数量） -->
      <div class="field" id="devicePickerField" style="display:none">
        <label>指定卡号 <span class="unit">勾选后忽略数量</span></label>
        <div class="device-picker" id="devicePicker"></div>
      </div>

      <!-- ── 终端模式字段 ── -->
      <div id="terminalFields" style="display:none">
        <div class="field">
          <label>用户名 <span class="unit">必填</span></label>
          <input type="text" class="text-input" id="usernameInput" placeholder="输入系统用户名" autocomplete="off">
        </div>
        <div class="field">
          <label>密码 <span class="unit">必填</span></label>
          <input type="password" class="text-input" id="passwordInput" placeholder="输入终端登录密码" autocomplete="off">
        </div>
      </div>

      <!-- ── 命令模式字段 ── -->
      <div id="commandFields">
        <div class="field">
          <label>用户名 <span class="unit">用于标识任务归属</span></label>
          <input type="text" class="text-input" id="cmdUserId" placeholder="输入你的用户名" autocomplete="off">
        </div>
        <div class="field">
          <label>命令 <span class="unit">每行一条，自动 && 拼接</span></label>
          <textarea class="text-input cmd-textarea" id="cmdInput" placeholder="nvidia-smi&#10;echo hello" autocomplete="off" rows="4"></textarea>
        </div>
      </div>

      <!-- 提交按钮 -->
      <button type="submit" class="submit-btn" id="submitBtn" disabled>
        提交命令
      </button>
    </form>

    <div class="result" id="result"></div>
  </div>

  <!-- ═══ 中栏：任务队列 / 实验列表 ═══ -->
  <div class="panel panel-queue" id="queuePanel">
    <div class="queue-header">
      <span class="section-label" style="margin-bottom:0">任务队列</span>
      <input type="checkbox" id="queueSelectAll" title="全选" style="margin-left:auto;margin-right:6px;accent-color:var(--accent)">
      <button class="refresh-btn" id="queueRefreshBtn" title="刷新队列" aria-label="刷新队列">↻</button>
    </div>
    <div class="queue-filter-bar">
      <input type="text" class="text-input" id="queueUserFilter" placeholder="筛选用户…" autocomplete="off" style="font-size:11px;padding:2px 8px;height:auto">
    </div>
    <div class="queue-batch-bar" id="queueBatchBar" style="display:none">
      <span id="queueBatchCount" style="font-size:12px;color:var(--sub)">已选 0 项</span>
      <button class="submit-btn danger" id="queueBatchDeleteBtn" style="padding:2px 12px;font-size:11px">删除选中</button>
    </div>
    <div class="queue-list" id="queueList">
      <div class="queue-empty">选择节点后刷新</div>
    </div>
  </div>

  <!-- 实验面板（实验模式显示） -->
  <div class="panel panel-queue" id="experimentPanel" style="display:none">
    <div class="queue-header">
      <span class="section-label" style="margin-bottom:0">实验记录</span>
      <button class="refresh-btn" id="expNewBtn" title="手动创建实验" aria-label="新建实验" style="margin-right:4px">+</button>
      <button class="refresh-btn" id="expRefreshBtn" title="刷新实验列表" aria-label="刷新实验列表">↻</button>
    </div>
    <div class="exp-search-row">
      <input type="text" class="text-input" id="expSearchInput" placeholder="搜索实验…" autocomplete="off">
    </div>
    <!-- 文件夹树 -->
    <div class="folder-tree" id="folderTree">
      <div class="folder-item active" data-folder-id="">
        <span class="folder-name">📁 全部实验</span>
        <span class="folder-actions" style="display:flex">
          <button class="folder-act-btn" data-action="add-child" title="新建文件夹">＋</button>
        </span>
      </div>
    </div>
    <div class="queue-list" id="experimentList">
      <div class="queue-empty">暂无实验记录</div>
    </div>
  </div>

  <!-- ═══ 右栏：终端 / 日志查看 ═══ -->
  <div class="panel panel-right" id="rightPanel">
    <!-- 终端头 -->
    <div class="terminal-header" id="terminalHeader">
      <span class="terminal-dot dot-red"></span>
      <span class="terminal-dot dot-yellow"></span>
      <span class="terminal-dot dot-green"></span>
      <span class="terminal-url" id="terminalUrl"></span>
      <button class="terminal-close" id="terminalClose" title="关闭终端">×</button>
    </div>

    <!-- 终端占位 -->
    <div class="terminal-placeholder" id="terminalPlaceholder">
      <div class="placeholder-icon">⌨</div>
      <p>选择一个节点并申请终端沙盒以开始</p>
    </div>

    <!-- 终端 iframe -->
    <iframe class="terminal-iframe" id="terminalIframe" src=""
            sandbox="allow-scripts allow-same-origin allow-forms"></iframe>

    <!-- 日志查看器（任务模式） -->
    <div class="log-viewer" id="logViewer">
      <div class="log-placeholder" id="logPlaceholder">
        <div class="placeholder-icon">📋</div>
        <p>点击队列中你自己的已完成任务查看日志</p>
      </div>
      <div class="log-content" id="logContent" style="display:none"></div>
      <div class="log-actions" id="logActions" style="display:none">
        <button class="save-exp-btn" id="saveExpBtn" title="保存为实验记录">💾 保存为实验记录</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- ═══ 节点管理弹窗 ═══ -->
<div class="modal-overlay" id="manageModal" style="display:none">
  <div class="modal-card">
    <div class="modal-header">
      <span>管理节点</span>
      <button class="modal-close" id="modalClose" title="关闭">×</button>
    </div>
    <div class="modal-body">
      <!-- 添加新节点 -->
      <div class="modal-section">
        <div class="modal-section-title">添加节点</div>
        <div class="modal-field-row">
          <input type="text" class="text-input" id="newNodeName" placeholder="名称" style="flex:2">
          <input type="text" class="text-input" id="newNodeHost" placeholder="host" style="flex:2">
          <input type="text" class="text-input" id="newNodePort" placeholder="端口" inputmode="numeric" style="flex:1">
          <button class="modal-add-btn" id="addNodeBtn">添加</button>
        </div>
      </div>
      <!-- 当前节点列表 -->
      <div class="modal-section">
        <div class="modal-section-title">已配置节点 <span class="unit" id="configNodeCount"></span></div>
        <div class="modal-node-list" id="configNodeList">
          <div style="color:var(--sub);font-size:13px;text-align:center;padding:12px">加载中…</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ 通知弹窗 ═══ -->
<div class="modal-overlay" id="noticeModal" style="display:none">
  <div class="modal-card" style="max-width:480px">
    <div class="modal-header">
      <span>📢 通知</span>
      <button class="modal-close" id="noticeModalClose" title="关闭">×</button>
    </div>
    <div class="modal-body" id="noticeModalBody" style="white-space:pre-wrap;line-height:1.7;font-size:13px">
      加载中…
    </div>
  </div>
</div>

<!-- ═══ 重新执行命令弹窗 ═══ -->
<div class="modal-overlay" id="rerunModal" style="display:none">
  <div class="modal-card" style="max-width:560px">
    <div class="modal-header">
      <span>重新执行命令</span>
      <button class="modal-close" id="rerunModalClose" title="关闭">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>命令</label>
        <textarea class="text-input" id="rerunCmdInput" rows="20" style="font-family:monospace;font-size:12px;resize:vertical"></textarea>
      </div>
      <div style="display:flex;gap:8px">
        <div class="field" style="flex:1">
          <label>CPU <span class="unit">核数</span></label>
          <input type="number" class="text-input" id="rerunCpu" min="0" value="0" style="text-align:center">
        </div>
        <div class="field" style="flex:1">
          <label>内存 <span class="unit">GB</span></label>
          <input type="number" class="text-input" id="rerunMem" min="0" value="0" style="text-align:center">
        </div>
        <div class="field" style="flex:1">
          <label>设备数</label>
          <input type="number" class="text-input" id="rerunDevNum" min="0" value="1" style="text-align:center">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="submit-btn" id="rerunConfirmBtn" style="flex:1;margin-top:0">确认执行</button>
        <button class="submit-btn cancel" id="rerunCancelBtn" style="flex:1;margin-top:0;background:var(--card-bg);color:var(--text);border:1px solid var(--border)">取消</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══ 实验弹窗（快速保存） ═══ -->
<div class="modal-overlay" id="expModal" style="display:none">
  <div class="modal-card exp-modal-card">
    <div class="modal-header">
      <span id="expModalTitle">保存实验记录</span>
      <button class="modal-close" id="expModalClose" title="关闭">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>实验标题 <span class="unit">必填</span></label>
        <input type="text" class="text-input" id="expTitle" placeholder="输入实验标题">
      </div>
      <div class="field">
        <label>标签 <span class="unit">逗号分隔</span></label>
        <input type="text" class="text-input" id="expTags" placeholder="breakdown, resnet50" autocomplete="off">
      </div>
      <div class="field">
        <label>文件夹</label>
        <select class="text-input" id="expFolder" style="width:100%">
          <option value="">— 无 —</option>
        </select>
      </div>
      <input type="hidden" id="expId">
      <input type="hidden" id="expTaskId">
      <input type="hidden" id="expNodeId">
      <input type="hidden" id="expCommand">
      <button class="submit-btn" id="expSaveBtn" style="width:100%;margin-top:8px">保存</button>
      <button class="submit-btn danger" id="expDeleteBtn" style="width:100%;margin-top:4px;display:none">删除实验</button>
    </div>
  </div>
</div>

<script src="/static/js/app.js"></script>
<script src="/static/js/terminal.js"></script>
<script src="/static/js/command.js"></script>
<script src="/static/js/experiment.js"></script>
<script src="/static/js/marked.min.js"></script>
</body>
</html>
